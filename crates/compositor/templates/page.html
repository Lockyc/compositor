<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} · {{ site_name }}</title>
  <link rel="stylesheet" href="{{ asset_prefix }}assets/compositor.css">
  <script>
    /* Anti-flash: apply a stored theme choice before first paint. */
    try { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) {}
  </script>
</head>
<body>
  <nav class="sidebar" id="nav" data-pagefind-ignore><div class="site-name"><a href="{{ home_href }}">{{ site_name }}</a></div>{{ nav_html|safe }}</nav>
  <main class="content" id="doc" data-pagefind-body>{{ body|safe }}</main>
  <script src="{{ asset_prefix }}assets/compositor.js" defer></script>
</body>
</html>

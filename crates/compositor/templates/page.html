<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} · {{ site_name }}</title>
  <link rel="stylesheet" href="{{ asset_prefix }}assets/compositor.css">
  <link rel="stylesheet" href="{{ asset_prefix }}pagefind/pagefind-ui.css">
  <script>
    /* Anti-flash: apply a stored theme choice before first paint. */
    try { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) {}
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ home_href }}">{{ site_name }}</a>
    <div class="search" id="search"></div>
    <button class="theme-toggle" type="button" aria-label="Toggle light/dark theme">◐</button>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"><span class="nav-toggle-icon" aria-hidden="true">☰</span> Menu</button>
  </header>
  <main class="layout{% if has_toc %} has-toc{% endif %}">
    <aside id="nav" data-pagefind-ignore>{{ nav_html|safe }}</aside>
    <article id="doc" role="document" data-pagefind-body>{{ body|safe }}
      {% if has_prev || has_next %}<nav class="page-nav" data-pagefind-ignore aria-label="Previous and next page">
        {% if has_prev %}<a class="page-nav-link page-nav-prev" href="{{ prev_href }}"><span class="page-nav-dir">← Previous</span><span class="page-nav-title">{{ prev_title }}</span></a>{% else %}<span></span>{% endif %}
        {% if has_next %}<a class="page-nav-link page-nav-next" href="{{ next_href }}"><span class="page-nav-dir">Next →</span><span class="page-nav-title">{{ next_title }}</span></a>{% endif %}
      </nav>{% endif %}</article>
    {% if has_toc %}<aside id="toc" data-pagefind-ignore><p class="toc-title">On this page</p>{{ toc_html|safe }}</aside>{% endif %}
  </main>
  <footer class="site-footer">Built with <a href="https://github.com/lockyc/compositor" rel="noopener">compositor</a></footer>
  <script src="{{ asset_prefix }}pagefind/pagefind-ui.js"></script>
  <script src="{{ asset_prefix }}assets/compositor.js" defer></script>
</body>
</html>

name    = "compositor"
summary = "A Rust static-site generator for Markdown doc repos — a from-scratch MkDocs replacement (reusable render engine + CLI)"
kind    = "tool"
status  = "active"
tags    = ["docs", "static-site-generator", "markdown", "mkdocs-replacement", "rust", "cli"]
stack   = ["rust", "comrak", "syntect", "askama"]

[[provides]]
name    = "compositor build"
summary = "Renders a Markdown docs directory into a themed, tree-navigated, Pagefind-indexed static HTML site; a drop-in replacement for `mkdocs build`"
url     = "https://github.com/Lockyc/compositor"

[[provides]]
name    = "render-core"
summary = "Reusable Rust library: Markdown → in-memory site model (frontmatter/title resolution, comrak+syntect render, tree nav, .md→.html link rewrite); embeddable by a future desktop viewer"
